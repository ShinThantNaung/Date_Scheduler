<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Valentine</title>
  </head>
  <body>
    <div id="hearts"></div>

    <div class="container">
      <div class="mascot-wrap">
        <img src="capoo.jpg" alt="Cutie mascot" class="mascot" />
      </div>

      <div id="askSection">
        <h1>Will you be my Valentine?</h1>
        <p class="subtitle">
          Choose wisely (there's really only one right answer)
        </p>

        <div class="button-row">
          <button id="yes">Yes 💖</button>
          <button id="no">No</button>
        </div>
      </div>

      <div id="acceptedSection" class="hidden">
        <h1>Yay! Best. Decision. Ever. 🥳</h1>
        <p class="subtitle">Now let's lock in our date 💌</p>

        <div class="schedule-card">
          <h2>Pick our date & time</h2>

          <label for="date">Date</label>
          <input type="date" id="date" required />

          <label for="time">Time</label>
          <input type="time" id="time" required />

          <button type="button" id="sendSchedule">Send Schedule 💕</button>

          <p id="successMsg" class="msg success hidden">
            Opening your email — hit send and it's a date! 🎉
          </p>
          <p id="errorMsg" class="msg error hidden">
            Please pick both a date and a time first 💗
          </p>
        </div>
      </div>
    </div>

    <button id="musicToggle" title="Toggle music">🎵</button>

    <script src="script.js"></script>
  </body>
</html>
